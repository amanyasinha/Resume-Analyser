<!DOCTYPE html>
<html>
<head>
    <title>Resume Analyzer</title>
</head>
<body>
    <h1>AI Resume Analyzer</h1>

    <form method="POST" enctype="multipart/form-data">
        <input type="file" name="resume" required>
        <button type="submit">Analyze</button>
    </form>

    {% if result %}
        <h2>Analysis Result:</h2>
        <pre>{{ result }}</pre>
    {% endif %}
</body>
</html>
